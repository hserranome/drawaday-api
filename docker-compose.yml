version: '3.5'

services:
  api:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/api
      - /api/node_modules
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=drawaday
    container_name: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

volumes:
  pgdata:
